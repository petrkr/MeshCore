[ESP32_OctopusLab_S3_LAN_LoRa]
extends = esp32_base
board = octopuslab_s3_lan_lora
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
build_flags =
  ${esp32_base.build_flags}
  -I variants/octopuslab_s3_lan_lora
  -D ESP32_OctopusLab_S3_LAN_LoRa
  -D RADIO_CLASS=CustomSX1276
  -D WRAPPER_CLASS=CustomSX1276Wrapper
  -D ETH_PHY_TYPE=ETH_PHY_W5500
  -D LAN_PHY_ADDR=1
  -D LAN_CS=5
  -D LAN_IRQ=6
  -D LAN_RST=7
  -D P_LORA_DIO_0=4
  -D P_LORA_DIO_1=21
  -D P_LORA_NSS=10
  -D P_LORA_RESET=RADIOLIB_NC
  -D P_LORA_SCLK=12
  -D P_LORA_MOSI=11
  -D P_LORA_MISO=13
  -D LORA_TX_POWER=20
  -D PIN_BOARD_SDA=1
  -D PIN_BOARD_SCL=2
build_src_filter = ${esp32_base.build_src_filter}
  +<../variants/octopuslab_s3_lan_lora>
lib_deps =
  ${esp32_base.lib_deps}
  adafruit/Adafruit SSD1306 @ ^2.5.13

[env:ESP32_OctopusLab_S3_LAN_LoRa_repeater]
extends = ESP32_OctopusLab_S3_LAN_LoRa
build_src_filter = ${ESP32_OctopusLab_S3_LAN_LoRa.build_src_filter}
  +<../examples/simple_repeater/*.cpp>
build_flags =
  ${ESP32_OctopusLab_S3_LAN_LoRa.build_flags}
  ${esp32_ota.build_flags}
  -D ADVERT_NAME='"OctopusLab S3 LAN Rep"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
;  -D MESH_PACKET_LOGGING=1
  -D MESH_DEBUG=1
lib_deps =
  ${ESP32_OctopusLab_S3_LAN_LoRa.lib_deps}
  ${esp32_ota.lib_deps}
