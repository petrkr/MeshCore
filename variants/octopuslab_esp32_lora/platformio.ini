[ESP32_OctopusLab_ESP32_LoRa]
extends = esp32_base
board = esp32dev
build_flags =
  ${esp32_base.build_flags}
  -I variants/octopuslab_esp32_lora
  -D ESP32_OctopusLab_ESP32_LoRa
  -D RADIO_CLASS=CustomSX1276
  -D WRAPPER_CLASS=CustomSX1276Wrapper
  -D DISPLAY_CLASS=SSD1306Display
  -D P_LORA_DIO_0=27
  -D P_LORA_DIO_1=25
  -D P_LORA_NSS=26
  -D P_LORA_RESET=RADIOLIB_NC
  -D P_LORA_SCLK=18
  -D P_LORA_MOSI=23
  -D P_LORA_MISO=19
  -D LORA_TX_POWER=20
  -D PIN_BOARD_SDA=21
  -D PIN_BOARD_SCL=22
  -D PIN_USER_BTN=0
  -D ENV_INCLUDE_SHT3X=1

build_src_filter = ${esp32_base.build_src_filter}
  +<../variants/octopuslab_esp32_lora>
  +<helpers/ui/SSD1306Display.cpp>
  +<helpers/sensors>
lib_deps =
  ${esp32_base.lib_deps}
  adafruit/Adafruit SSD1306 @ ^2.5.16
  sensirion/Sensirion I2C SHT3x @ ^1.0.1

[env:ESP32_OctopusLab_ESP32_LoRa_repeater]
extends = ESP32_OctopusLab_ESP32_LoRa
build_src_filter = ${ESP32_OctopusLab_ESP32_LoRa.build_src_filter}
  +<../examples/simple_repeater/*.cpp>
build_flags =
  ${ESP32_OctopusLab_ESP32_LoRa.build_flags}
  ${esp32_ota.build_flags}
  -D ADVERT_NAME='"OctopusLab ESP32 Repeater"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
;  -D MESH_PACKET_LOGGING=1
  -D MESH_DEBUG=1
lib_deps =
  ${ESP32_OctopusLab_ESP32_LoRa.lib_deps}
  ${esp32_ota.lib_deps}
